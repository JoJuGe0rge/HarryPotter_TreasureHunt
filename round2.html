<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round 2 - Object Hunt</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  font-family: 'Cinzel', serif;
  color: gold;
  text-align: center;

  background: linear-gradient(
    135deg,
    #1a1a2e,   /* dark indigo */
    #2b1d0e,   /* warm brown/gold tone */
    #0a0a0f
  );
}

/* CONTAINER */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* IMAGE AREA */
.game-area {
  position: relative;
  width: 90%;
  max-width: 900px;
  margin: auto;
}

/* BUTTON (BOTTOM RIGHT FLOATING) */
.clue-btn {
  position: absolute;
  bottom: 15px;
  right: 15px;

  all: unset;
  color: gold;
  cursor: pointer;
  font-size: 14px;

  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  border-radius: 5px;

  display: none; /* hidden initially */
}

/* INPUT SECTION */
.code-box {
  margin-top: 20px;
}

input {
  padding: 10px;
  border: 2px solid gold;
  background: black;
  color: gold;
}

button.submit-btn {
  padding: 10px 20px;
  border: 2px solid gold;
  background: black;
  color: gold;
  cursor: pointer;
}

button.submit-btn:hover {
  background: gold;
  color: black;
}

.error {
  color: red;
  margin-top: 10px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);

  justify-content: center;
  align-items: center;
}

.popup-content {
  background: black;
  border: 2px solid gold;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px gold;
}



</style>
</head>

<body>

<div class="container">

  <h2>🔍 Find the Hidden Objects</h2>

  <div class="game-area">
    <!-- IMAGE -->
    <img src="assets/images/bg2.jpg" style="width:100%; display:block;">

    <!-- CLUE BUTTON -->
    <button class="clue-btn" id="clueBtn" onclick="showCluePopup()">Get Clue</button>
  </div>

  <!-- INPUT -->
  <div class="code-box">
    <p>Enter the verification code:</p>
    <input type="text" id="codeInput" placeholder="Enter code">
    <button class="submit-btn" onclick="checkCode()">Submit</button>
    <p id="error" class="error"></p>
  </div>

</div>

<!-- POPUP -->
<div id="cluePopup" class="popup">
  <div class="popup-content">
    <h3>🔐 Hidden Clue</h3>
    <p>The magical code is: <strong>12130</strong></p>
    <button onclick="closeCluePopup()">Close</button>
  </div>
</div>

<script>

/* PREVENT SKIPPING */
let round = localStorage.getItem("round");
if (!round || round < 2) {
  window.location.href = "index.html";
}

/* TRACK WRONG ATTEMPTS */
let wrongAttempts = 0;

/* CHECK CODE */
function checkCode() {
  let code = document.getElementById("codeInput").value.trim();

  if (code === "12130") {
    showClue();
  } else {
    wrongAttempts++;
    document.getElementById("error").innerText = "❌ Incorrect code. Try again!";

    // SHOW CLUE BUTTON AFTER 1 WRONG ATTEMPT
    if (wrongAttempts >= 1) {
      document.getElementById("clueBtn").style.display = "block";
    }
  }
}

/* ENTER KEY SUPPORT */
document.getElementById("codeInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") checkCode();
});

/* POPUP CONTROL */
function showCluePopup() {
  document.getElementById("cluePopup").style.display = "flex";
}

function closeCluePopup() {
  document.getElementById("cluePopup").style.display = "none";
}

/* CLOSE ON OUTSIDE CLICK */
window.onclick = function(e) {
  let popup = document.getElementById("cluePopup");
  if (e.target === popup) {
    popup.style.display = "none";
  }
}

/* SHOW CLUE IMAGE */
function showClue() {
  document.body.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; color:gold;">
      <h2>✨ Clue Unlocked ✨</h2>
      <img src="assets/images/clue2.jpg" style="width:250px; border:2px solid gold; box-shadow:0 0 20px gold;">
      <br><br>
      <button onclick="nextRound()" style="padding:10px 20px; border:2px solid gold; background:black; color:gold; cursor:pointer;">
        Proceed
      </button>
    </div>
  `;
}

/* NEXT ROUND */
function nextRound() {
  localStorage.setItem("round", 3);
  window.location.href = "round3.html";
}

</script>

</body>
</html>
