<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round 4 - Potion Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cinzel', serif;
  color: gold;
  text-align: center;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('assets/images/bg4.jpg') no-repeat center center;
  background-size: cover;
}

/* CONTAINER */
.container {
  margin-top: 60px;
}

/* QUESTION CARD */
.card {
  border: 2px solid gold;
  border-radius: 10px;
  padding: 20px;
  margin: 20px auto;
  width: 90%;
  max-width: 500px;
  background: rgba(0,0,0,0.6);
}

/* OPTIONS */
.option {
  display: block;
  margin: 10px 0;
  padding: 10px;
  border: 1px solid gold;
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: gold;
  color: black;
}

/* STATUS */
.status {
  margin-top: 15px;
  font-size: 18px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border: 2px solid gold;
  background: black;
  color: gold;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  background: gold;
  color: black;
}

/* CLUE */
.clue-img {
  animation: reveal 1.5s ease-in-out, glowPulse 2.5s infinite alternate;
  display: block;
  margin: 20px auto;
  width: 500px;
  border: 2px solid gold;
  border-radius: 10px;
  box-shadow: 0 0 30px gold;
}

@keyframes reveal {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container" id="app">
  <h2>🧪 Potion Knowledge</h2>

  <div class="card">
    <p id="question"></p>
    <div id="options"></div>
  </div>

  <div class="status" id="status"></div>
  <div class="status" id="progress"></div>
</div>

<script>

/* PREVENT SKIPPING */
let round = localStorage.getItem("round");
if (!round || round < 4) {
  window.location.href = "index.html";
}

/* QUESTIONS */
const questions = [
  {
    q: "Potion used for transformation?",
    options: ["Felix Felicis", "Polyjuice Potion", "Amortentia", "Veritaserum"],
    correct: "Polyjuice Potion"
  },
  {
    q: "Potion that brings luck?",
    options: ["Polyjuice Potion", "Felix Felicis", "Wolfsbane", "Elixir of Life"],
    correct: "Felix Felicis"
  },
  {
    q: "Potion that makes you tell truth?",
    options: ["Veritaserum", "Amortentia", "Draught of Peace", "Polyjuice Potion"],
    correct: "Veritaserum"
  },
  {
    q: "Love potion is called?",
    options: ["Amortentia", "Felix Felicis", "Wolfsbane", "Veritaserum"],
    correct: "Amortentia"
  }
];

let current = 0;
let correct = 0;

function loadQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let optionsHTML = "";
  q.options.forEach(opt => {
    optionsHTML += `<div class="option" onclick="checkAnswer('${opt}')">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
  document.getElementById("progress").innerText = `Correct: ${correct} / 3`;
}

loadQuestion();

/* CHECK ANSWER */
function checkAnswer(selected) {
  let q = questions[current];

  if (selected === q.correct) {
    correct++;
    document.getElementById("status").innerText = "✅ Correct!";
  } else {
    document.getElementById("status").innerText = "❌ Wrong!";
  }

  current++;

  if (correct >= 3) {
    setTimeout(showClue, 800);
  } else if (current < questions.length) {
    setTimeout(loadQuestion, 800);
  } else {
    document.getElementById("status").innerText =
      "❌ Not enough correct answers. Refresh to try again!";
  }
}

/* SHOW CLUE */
function showClue() {
  document.body.innerHTML = `
    <h2>✨ Clue Unlocked ✨</h2>
    <img src="assets/images/clue4.jpg" class="clue-img">
    <br><br>
    <button onclick="nextRound()">Proceed</button>
  `;
}

/* NEXT ROUND */
function nextRound() {
  localStorage.setItem("round", 5);
  window.location.href = "round5.html";
}

</script>

</body>
</html>
