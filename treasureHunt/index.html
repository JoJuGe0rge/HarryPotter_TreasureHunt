<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter Treasure Hunt</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', serif;
            background-image: url('assets/images/bg0.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #FFD700;
        }
        p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        .start-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #8B0000, #FFD700);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .start-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Harry Potter Treasure Hunt!</h1>
        <p>Embark on a magical journey through Hogwarts and beyond. Solve riddles, uncover clues, and discover hidden treasures. Are you ready to prove your wizarding prowess?</p>
        <a href="round1.html" class="start-button">Begin Your Adventure</a>
    </div>
</body>
</html>
